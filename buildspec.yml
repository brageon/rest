version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10-slim
    commands:
      - pip install numpy awscli
      
  pre_build:  
    commands:
      - aws configure set aws_role_arn $AWS_ROLE_ARN
      - unzip adm/nltp/punkt.zip -d adm/nltp
      - unzip adm/nltp/averaged_perceptron_tagger.zip -d adm/nltp
    
  build:
    commands:
      - aws s3 cp s3://ddarwin/oak.txt oak.txt
      - export NLTK_DATA=adm/nltp
      - python intro.py

  post_build:
    commands:
      - aws s3 cp dove.txt s3://ddarwin/dove.txt

cache:
  paths:
    - /root/.pyenv/versions/3.10.13/lib/python3.10/site-packages/
