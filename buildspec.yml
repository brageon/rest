version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install -r requirements.txt
      
  pre_build:  
    commands:
      - aws configure set aws_role_arn $AWS_ROLE_ARN
      - aws s3 cp s3://ddarwin/oak.txt oak.txt
    
  build:
    commands:
      - export NLTK_DOWNLOAD="punkt,averaged_perceptron_tagger"
      - docker build -t rezt .
      - docker info

  post_build:
    commands:
      - python intro.py
      - aws s3 cp oanc/dove.txt s3://ddarwin/dove.txt

cache:
  paths:
    - /root/.pyenv/versions/3.10.13/lib/python3.10/site-packages/
    - requirements.txt
