version: 0.2

phases:
  cache:
    paths:
      - /root/.pyenv/versions/3.10.13/lib/python3.10/site-packages/

  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install --upgrade awscli
      - pip install -U nltk numpy
      - python -m nltk.downloader punkt
      - python -m nltk.downloader averaged_perceptron_tagger

  pre_build:
    commands:
      - aws configure set aws_role_arn $AWS_ROLE_ARN
      
  build:
    commands:
      - aws s3 cp s3://ddarwin/oak.txt oak.txt
      - python intro.py > dove.txt
      
  post_build:
    commands:
      - aws s3 cp dove.txt s3://ddarwin/dove.txt