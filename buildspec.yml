version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo "Success" 
      
  pre_build:  
    commands:
      - aws configure set aws_role_arn $AWS_ROLE_ARN
    
  build:
    commands:
      - docker build -t rezt:latest . --build-arg NLTK_DOWNLOAD="punkt averaged_perceptron_tagger"

  post_build:
    commands:
      - aws s3 cp oanc/dove.txt s3://ddarwin/dove.txt

cache:
  paths:
    - /root/.pyenv/versions/3.10.13/lib/python3.10/site-packages/
    - requirements.txt
